name: Release

on:
  push:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Tag Version
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, appending run number."
            NEW_VERSION="v${VERSION}-update.${{ github.run_number }}"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION does not exist, creating it."
            echo "version=v$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.check.outputs.version }}
          git push origin ${{ steps.check.outputs.version }}

  # ═══════════════════════════════════════════════════════════════════════════════
  # Desktop (Tauri) — 5 targets
  # ═══════════════════════════════════════════════════════════════════════════════
  build-tauri:
    needs: [check-version]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            rust_target: "aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            rust_target: "x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
            rust_target: ""
          - platform: "windows-latest"
            args: ""
            rust_target: ""
          - platform: "windows-latest"
            args: "--target aarch64-pc-windows-msvc"
            rust_target: "aarch64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.check-version.outputs.version }}
          releaseName: "StockenBoard ${{ needs.check-version.outputs.version }}"
          releaseBody: |
            See [Installation & Usage](https://github.com/Wing9897/StockenBoard#-快速開始) for setup instructions.
            
            **Desktop:** Download the installer for your OS below.
            **Web Server:** Download `stockenboard-server-*` or use Docker: `docker run -p 8080:8080 ghcr.io/wing9897/stockenboard:${{ needs.check-version.outputs.version }}`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ═══════════════════════════════════════════════════════════════════════════════
  # Server Binary — 4 targets (cross-compiled)
  # ═══════════════════════════════════════════════════════════════════════════════
  build-server:
    needs: [check-version]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: stockenboard-server-linux-amd64
            script: server:build:linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: stockenboard-server-darwin-arm64
            script: server:build:mac-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: stockenboard-server-windows-amd64.exe
            script: server:build:win-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: server-${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build server (npm script)
        run: npm run ${{ matrix.script }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp src-tauri/target/${{ matrix.target }}/release/server ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: copy src-tauri\target\${{ matrix.target }}\release\server.exe ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════════
  # Docker Image (multi-arch)
  # ═══════════════════════════════════════════════════════════════════════════════
  build-docker:
    needs: [check-version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner name
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.lower.outputs.owner }}/stockenboard:latest
            ghcr.io/${{ steps.lower.outputs.owner }}/stockenboard:${{ needs.check-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
